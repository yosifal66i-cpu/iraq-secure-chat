version: '3.8'

networks:
  iraqchat-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  elasticsearch-data:

services:
  # ============================================
  # API Gateway
  # ============================================
  api-gateway:
    build:
      context: ../backend/api-gateway
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      - SERVICE_NAME=api-gateway
      - SERVER_PORT=8090
      - ENVIRONMENT=development
      - JWT_ACCESS_SECRET=dev-access-secret-key-change-in-production
      - JWT_REFRESH_SECRET=dev-refresh-secret-key-change-in-production
      - REDIS_URL=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # Auth Service
  # ============================================
  auth-service:
    build:
      context: ../backend/auth-service
      dockerfile: Dockerfile
    ports:
      - "8091:8091"
    environment:
      - SERVICE_NAME=auth-service
      - SERVER_PORT=8091
      - ENVIRONMENT=development
      - POSTGRES_DSN=postgres://iraqchat:changeme@postgres:5432/iraqchat?sslmode=disable
      - REDIS_URL=redis:6379
      - JWT_ACCESS_SECRET=dev-access-secret-key-change-in-production
      - JWT_REFRESH_SECRET=dev-refresh-secret-key-change-in-production
      - OTP_LENGTH=6
      - OTP_EXPIRY=180
      - OTP_MAX_ATTEMPTS=5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # Message Service
  # ============================================
  message-service:
    build:
      context: ../backend/message-service
      dockerfile: Dockerfile
    ports:
      - "8092:8092"
    environment:
      - SERVICE_NAME=message-service
      - SERVER_PORT=8092
      - ENVIRONMENT=development
      - POSTGRES_DSN=postgres://iraqchat:changeme@postgres:5432/iraqchat?sslmode=disable
      - REDIS_URL=redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # Media Service
  # ============================================
  media-service:
    build:
      context: ../backend/media-service
      dockerfile: Dockerfile
    ports:
      - "8093:8093"
    environment:
      - SERVICE_NAME=media-service
      - SERVER_PORT=8093
      - ENVIRONMENT=development
      - POSTGRES_DSN=postgres://iraqchat:changeme@postgres:5432/iraqchat?sslmode=disable
      - REDIS_URL=redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET=iraqchat-media
    volumes:
      - ./data/uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # Presence Service
  # ============================================
  presence-service:
    build:
      context: ../backend/presence-service
      dockerfile: Dockerfile
    ports:
      - "8094:8094"
    environment:
      - SERVICE_NAME=presence-service
      - SERVER_PORT=8094
      - REDIS_URL=redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # WebSocket Gateway
  # ============================================
  websocket-gateway:
    build:
      context: ../backend/websocket-gateway
      dockerfile: Dockerfile
    ports:
      - "8095:8095"
    environment:
      - SERVICE_NAME=websocket-gateway
      - SERVER_PORT=8095
      - REDIS_URL=redis:6379
      - JWT_ACCESS_SECRET=dev-access-secret-key-change-in-production
      - STUN_SERVERS=stun:stun.l.google.com:19302
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # Bot Service
  # ============================================
  bot-service:
    build:
      context: ../backend/bot-service
      dockerfile: Dockerfile
    ports:
      - "8096:8096"
    environment:
      - SERVICE_NAME=bot-service
      - SERVER_PORT=8096
      - POSTGRES_DSN=postgres://iraqchat:changeme@postgres:5432/iraqchat?sslmode=disable
      - REDIS_URL=redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # AI Service
  # ============================================
  ai-service:
    build:
      context: ../backend/ai-service
      dockerfile: Dockerfile
    ports:
      - "8097:8097"
    environment:
      - SERVICE_NAME=ai-service
      - SERVER_PORT=8097
      - REDIS_URL=redis:6379
      - AI_ENABLED=true
      - AI_PROVIDER=ollama
      - AI_API_URL=http://ollama:11434/api/generate
      - AI_MODERATION_ENABLED=true
      - AI_SMART_REPLY_ENABLED=true
      - AI_TRANSLATION_ENABLED=true
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # Notification Service
  # ============================================
  notification-service:
    build:
      context: ../backend/notification-service
      dockerfile: Dockerfile
    ports:
      - "8098:8098"
    environment:
      - SERVICE_NAME=notification-service
      - SERVER_PORT=8098
      - POSTGRES_DSN=postgres://iraqchat:changeme@postgres:5432/iraqchat?sslmode=disable
      - REDIS_URL=redis:6379
      - KAFKA_BROKERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # PostgreSQL 16
  # ============================================
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=iraqchat
      - POSTGRES_USER=iraqchat
      - POSTGRES_PASSWORD=changeme
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../backend/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iraqchat"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # Redis Cluster
  # ============================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --notify-keyspace-events Ex
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # Apache Kafka
  # ============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - iraqchat-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # MinIO (S3-compatible storage)
  # ============================================
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # Elasticsearch
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # Ollama (AI model serving)
  # ============================================
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # Web Client (React/Vite)
  # ============================================
  web-client:
    build:
      context: ../web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8090
      - VITE_WS_URL=ws://localhost:8095/v1/ws
    depends_on:
      - api-gateway
    networks:
      - iraqchat-net
    restart: unless-stopped

  # ============================================
  # Prometheus + Grafana (Monitoring)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - iraqchat-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3100:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
    networks:
      - iraqchat-net
    restart: unless-stopped
