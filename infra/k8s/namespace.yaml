apiVersion: v1
kind: Namespace
metadata:
  name: iraqchat
  labels:
    name: iraqchat
    environment: production
    security-tier: restricted
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: iraqchat-quota
  namespace: iraqchat
spec:
  hard:
    requests.cpu: "32"
    requests.memory: "64Gi"
    limits.cpu: "64"
    limits.memory: "128Gi"
    persistentvolumeclaims: "20"
    pods: "100"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: iraqchat
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: api-gateway
