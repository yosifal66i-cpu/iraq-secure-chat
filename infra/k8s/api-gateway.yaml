apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: iraqchat
  labels:
    app: api-gateway
    tier: gateway
spec:
  replicas: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: iraqchat-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
        - name: api-gateway
          image: iraqchat/api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "api-gateway"
            - name: ENVIRONMENT
              value: "production"
            - name: SERVER_PORT
              value: "8090"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: iraqchat-redis
                  key: url
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: iraqchat-jwt
                  key: access-secret
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: iraqchat-jwt
                  key: refresh-secret
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: iraqchat
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8090
      targetPort: 8090
      protocol: TCP
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: iraqchat
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
