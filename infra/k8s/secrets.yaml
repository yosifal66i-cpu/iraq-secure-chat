apiVersion: v1
kind: Secret
metadata:
  name: iraqchat-jwt
  namespace: iraqchat
type: Opaque
stringData:
  access-secret: "REPLACE_WITH_GENERATED_64_CHAR_HEX"
  refresh-secret: "REPLACE_WITH_GENERATED_64_CHAR_HEX"
---
apiVersion: v1
kind: Secret
metadata:
  name: iraqchat-database
  namespace: iraqchat
type: Opaque
stringData:
  postgres-dsn: "postgres://iraqchat:REPLACE_PASSWORD@postgres:5432/iraqchat?sslmode=require"
---
apiVersion: v1
kind: Secret
metadata:
  name: iraqchat-redis
  namespace: iraqchat
type: Opaque
stringData:
  url: "redis://:REPLACE_REDIS_PASSWORD@redis:6379"
  password: "REPLACE_REDIS_PASSWORD"
---
apiVersion: v1
kind: Secret
metadata:
  name: iraqchat-s3
  namespace: iraqchat
type: Opaque
stringData:
  access-key: "REPLACE_S3_ACCESS_KEY"
  secret-key: "REPLACE_S3_SECRET_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: iraqchat-ai
  namespace: iraqchat
type: Opaque
stringData:
  api-key: "REPLACE_AI_API_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: iraqchat-push
  namespace: iraqchat
type: Opaque
stringData:
  fcm-key: "REPLACE_FCM_KEY"
  apns-key: "REPLACE_APNS_KEY"
  vapid-public: "REPLACE_VAPID_PUBLIC"
  vapid-private: "REPLACE_VAPID_PRIVATE"
---
apiVersion: v1
kind: Secret
metadata:
  name: iraqchat-turn
  namespace: iraqchat
type: Opaque
stringData:
  credential: "REPLACE_TURN_CREDENTIAL"
